name: Deploy demo to GitHub Pages

# Builds the static, in-browser demo (see web/src/demo/) and publishes it.
# The live server isn't deployed anywhere — GitHub Pages only serves files —
# so this ships the whole stack compiled into the page.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Let a running deploy finish; queue at most one more.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Seeds a fresh SQLite snapshot and builds the web app in demo mode.
      # The seed reads product images from web/public/images, which are in the
      # repo, and needs no secrets — the build script supplies its own env.
      - run: npm run build:demo

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
